<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Book Seat - TrainApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">TrainApp</a>
        <div class="d-flex">
            <span class="navbar-text text-white me-3">
                Welcome, <span sec:authentication="name"></span>
            </span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 text-center">
                    <h4 class="mb-0">Booking Confirmation</h4>
                </div>
                <div class="card-body p-4">

                    <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>

                    <div class="mb-4">
                        <h5 class="border-bottom pb-2">Trip Summary</h5>
                        <p class="mb-1"><strong>Train:</strong> <span th:text="${schedule.train.name}"></span></p>
                        <p class="mb-1"><strong>From:</strong> <span th:text="${from}"></span></p>
                        <p class="mb-1"><strong>To:</strong> <span th:text="${to}"></span></p>
                        <p class="mb-0"><strong>Departure Time:</strong> <span th:text="${schedule.getDepartureTimeAt(from)}"></span></p>
                    </div>

                    <form th:action="@{/book/{id}(id=${schedule.id})}" method="post">
                        <input type="hidden" name="from" th:value="${from}">
                        <input type="hidden" name="to" th:value="${to}">

                        <div class="mb-4">
                            <label class="form-label fw-bold">Select Number of Seats</label>
                            <select name="numberOfSeats" class="form-select" required>
                                <option value="1">1 Seat</option>
                                <option value="2">2 Seats</option>
                                <option value="3">3 Seats</option>
                                <option value="4">4 Seats</option>
                                <option value="5">5 Seats</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">Confirm Reservation</button>
                            <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
