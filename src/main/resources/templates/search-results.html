<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Search Results - TrainApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">TrainApp</a>
        <div class="d-flex">
            <a th:href="@{/}" class="btn btn-outline-light">New Search</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">
        Routes from <span class="text-primary" th:text="${from}"></span>
        to <span class="text-primary" th:text="${to}"></span>
    </h2>

    <div th:if="${results.isEmpty()}" class="alert alert-warning fs-5">
        No routes found between these stations.
    </div>

    <div th:each="result : ${results}" class="card shadow-sm mb-4 border-0">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <div>
                <h5 class="mb-0">
                    <span th:text="${result.totalDepartureTime}"></span> &rarr; <span th:text="${result.totalArrivalTime}"></span>
                </h5>
                <small class="text-muted">
                    Duration: <span th:text="${result.formattedTotalDuration}"></span> |
                    Transfers: <span th:text="${result.numberOfTransfers}"></span>
                </small>
            </div>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Train</th>
                        <th>Departure</th>
                        <th>Arrival</th>
                        <th>Delay</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="leg : ${result.legs}">
                        <td>
                            <strong th:text="${leg.trainName}"></strong>
                        </td>
                        <td>
                            <div th:text="${leg.fromStation}"></div>
                            <small class="text-muted" th:text="${leg.departureTime}"></small>
                        </td>
                        <td>
                            <div th:text="${leg.toStation}"></div>
                            <small class="text-muted" th:text="${leg.arrivalTime}"></small>
                        </td>
                        <td>
                            <span th:if="${leg.delayMinutes > 0}" class="text-danger fw-bold" th:text="'+' + ${leg.delayMinutes} + ' min'"></span>
                            <span th:if="${leg.delayMinutes == 0}" class="text-success">On time</span>
                        </td>
                        <td>
                            <a th:href="@{/book/{id}(id=${leg.scheduleId}, from=${leg.fromStation}, to=${leg.toStation})}" class="btn btn-sm btn-success">Book Seat</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

</body>
</html>
