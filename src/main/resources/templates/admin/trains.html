<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Trains - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin/schedules">Admin Panel</a>
        <div class="navbar-nav d-flex flex-row">
            <a class="nav-link me-3" href="/admin/trains">Trains</a>
            <a class="nav-link me-3" href="/admin/routes">Routes</a>
            <a class="nav-link" href="/admin/schedules">Schedules</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title">Add New Train</h5>
                    <form th:action="@{/admin/trains}" th:object="${trainForm}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Train Name</label>
                            <input type="text" th:field="*{name}" class="form-control" required placeholder="ex: IR 1523">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Capacity</label>
                            <input type="number" th:field="*{capacity}" class="form-control" required min="1">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Train</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div th:if="${param.success}" class="alert alert-success">Train added successfully!</div>
            <div th:if="${param.deleted}" class="alert alert-warning">Train deleted!</div>
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>Capacity</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="train : ${trains}">
                            <td th:text="${train.name}"></td>
                            <td th:text="${train.capacity}"></td>
                            <td class="d-flex">
                                <a th:href="@{/admin/trains/{id}/edit(id=${train.id})}" class="btn btn-sm btn-info me-2">Edit</a>
                                <form th:action="@{/admin/trains/{id}/delete(id=${train.id})}" method="post" onsubmit="return confirm('Delete this train?');">
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
