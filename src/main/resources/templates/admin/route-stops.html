<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Route Stops</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin/schedules">Admin Panel</a>
        <div class="navbar-nav d-flex flex-row">
            <a class="nav-link me-3" href="/admin/trains">Trains</a>
            <a class="nav-link me-3 active" href="/admin/routes">Routes</a>
            <a class="nav-link" href="/admin/schedules">Schedules</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Stops for Route: <span class="text-primary" th:text="${route.name}"></span></h2>
        <a href="/admin/routes" class="btn btn-secondary">Back to Routes</a>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title">Add New Stop</h5>
                    <form th:action="@{/admin/routes/{id}/stops(id=${route.id})}" th:object="${stopForm}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Station</label>
                            <select th:field="*{stationId}" class="form-select" required>
                                <option value="" disabled selected>Select a station...</option>
                                <option th:each="station : ${stations}" th:value="${station.id}" th:text="${station.name}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Stop Order (1, 2, 3...)</label>
                            <input type="number" th:field="*{stopOrder}" class="form-control" required min="1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Minutes from Start</label>
                            <input type="number" th:field="*{minutesFromStart}" class="form-control" required min="0" placeholder="e.g., 0 for the first stop">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Add Stop</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div th:if="${param.success}" class="alert alert-success">Stop added successfully!</div>
            <div th:if="${param.deleted}" class="alert alert-warning">Stop removed!</div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Order</th>
                            <th>Station</th>
                            <th>Time from Start (min)</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="stop : ${sortedStops}">
                            <td><span class="badge bg-secondary fs-6" th:text="${stop.stopOrder}"></span></td>
                            <td><strong th:text="${stop.station.name}"></strong></td>
                            <td th:text="${stop.minutesFromStart} + ' min'"></td>
                            <td>
                                <form th:action="@{/admin/routes/{routeId}/stops/{stopId}/delete(routeId=${route.id}, stopId=${stop.id})}" method="post" onsubmit="return confirm('Remove this stop?');">
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(sortedStops)}">
                            <td colspan="4" class="text-center py-4">No stops defined for this route yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
