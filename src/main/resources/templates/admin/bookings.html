<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Bookings for <span th:text="${schedule.train.name}"></span> (<span th:text="${schedule.route.name}"></span>)</h3>
        <a href="/admin/schedules" class="btn btn-secondary">Back</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead class="table-light">
                <tr>
                    <th>Passenger</th>
                    <th>Email</th>
                    <th>Segment</th>
                    <th>Seats</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.user.name}"></td>
                    <td th:text="${booking.user.email}"></td>
                    <td th:text="${booking.fromStation + ' -> ' + booking.toStation}"></td>
                    <td th:text="${booking.numberOfSeats}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="4" class="text-center py-4">No bookings found for this train.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
