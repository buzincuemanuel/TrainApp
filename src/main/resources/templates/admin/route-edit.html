<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Route - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body">
                    <h4 class="mb-4">Edit Route Name</h4>
                    <form th:action="@{/admin/routes/{id}/edit(id=${routeId})}" th:object="${routeForm}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Route Name</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                            <div class="form-text">Note: Editing the name will preserve existing stops.</div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Update Route</button>
                            <a href="/admin/routes" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
