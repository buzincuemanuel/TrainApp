<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Routes - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin/schedules">Admin Panel</a>
        <div class="navbar-nav d-flex flex-row">
            <a class="nav-link me-3" href="/admin/trains">Trains</a>
            <a class="nav-link me-3 active" href="/admin/routes">Routes</a>
            <a class="nav-link" href="/admin/schedules">Schedules</a>
        </div>
    </div>
</nav>

<div class="container">
    <div th:if="${param.success}" class="alert alert-success mb-4">Route saved successfully!</div>
    <div th:if="${param.updated}" class="alert alert-info mb-4">Route updated successfully!</div>
    <div th:if="${param.deleted}" class="alert alert-warning mb-4">Route deleted!</div>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Add New Route</h5>
                    <form th:action="@{/admin/routes}" th:object="${routeForm}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Route Name</label>
                            <input type="text" th:field="*{name}" class="form-control" required placeholder="ex: Cluj - Bucuresti">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Route</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Route Name</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="route : ${routes}">
                            <td th:text="${route.name}"></td>
                            <td class="d-flex">
                                <a th:href="@{/admin/routes/{id}/stops(id=${route.id})}" class="btn btn-sm btn-secondary me-2">Manage Stops</a>

                                <a th:href="@{/admin/routes/{id}/edit(id=${route.id})}" class="btn btn-sm btn-info me-2">Edit</a>
                                <form th:action="@{/admin/routes/{id}/delete(id=${route.id})}" method="post" onsubmit="return confirm('Delete route? This will also delete all stops on it.');">
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
