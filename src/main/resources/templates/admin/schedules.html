<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Train Schedules - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin/schedules">Admin Panel</a>
        <div class="navbar-nav d-flex flex-row">
            <a class="nav-link me-3" href="/admin/trains">Trains</a>
            <a class="nav-link me-3" href="/admin/routes">Routes</a>
            <a class="nav-link" href="/admin/schedules">Schedules</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Current Schedules & Delays</h2>
    <div th:if="${param.success}" class="alert alert-success">Delay updated and passengers notified!</div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Train</th>
                    <th>Route</th>
                    <th>Departure</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="schedule : ${schedules}">
                    <td th:text="${schedule.train.name}"></td>
                    <td th:text="${schedule.route.name}"></td>
                    <td th:text="${schedule.departureTime}"></td>
                    <td>
                        <span th:if="${schedule.delayMinutes > 0}" class="text-danger fw-bold" th:text="'+' + ${schedule.delayMinutes} + ' min'"></span>
                        <span th:if="${schedule.delayMinutes == 0}" class="text-success">On time</span>
                    </td>
                    <td class="d-flex align-items-center">
                        <form th:action="@{/admin/schedules/{id}/delay(id=${schedule.id})}" method="post" class="d-flex me-3">
                            <input type="number" name="delayMinutes" class="form-control form-control-sm me-1" style="width: 70px;" placeholder="Min" required>
                            <button type="submit" class="btn btn-sm btn-warning">Set Delay</button>
                        </form>
                        <a th:href="@{/admin/schedules/{id}/bookings(id=${schedule.id})}" class="btn btn-sm btn-outline-primary">View Bookings</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
