<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Home - TrainApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5">
    <div class="container">
        <a class="navbar-brand" href="/">TrainApp</a>
        <div class="d-flex">
            <span sec:authorize="isAuthenticated()" class="navbar-text text-white me-3">
                Welcome, <span sec:authentication="name"></span>
            </span>
            <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="btn btn-outline-light me-2">Login</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/register}" class="btn btn-light">Register</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0 rounded-lg mt-5">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h3 class="mb-0">Find Your Train</h3>
                </div>
                <div class="card-body p-5">
                    <div th:if="${param.bookingSuccess}" class="alert alert-success mb-4">
                        Booking completed successfully!
                    </div>
                    <form th:action="@{/search}" method="get">
                        <div class="row mb-4">
                            <div class="col-md-5">
                                <label class="form-label fw-bold">From Station</label>
                                <input type="text" name="from" class="form-control form-control-lg" required placeholder="e.g. Cluj-Napoca">
                            </div>
                            <div class="col-md-2 d-flex align-items-center justify-content-center">
                                <span class="fs-3 text-muted">&rarr;</span>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label fw-bold">To Station</label>
                                <input type="text" name="to" class="form-control form-control-lg" required placeholder="e.g. Bucuresti">
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Search Routes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
