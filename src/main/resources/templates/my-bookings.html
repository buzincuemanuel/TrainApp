<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>My Bookings - TrainApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5">
    <div class="container">
        <a class="navbar-brand" href="/">TrainApp</a>
        <div class="d-flex align-items-center">
            <a th:href="@{/my-bookings}" class="text-white text-decoration-none me-4 fw-bold">My Bookings</a>
            <span class="navbar-text text-white me-3">
                Welcome, <span sec:authentication="name"></span>
            </span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4">My Bookings</h2>

            <div th:if="${#lists.isEmpty(bookings)}" class="alert alert-info">
                You don't have any bookings yet. <a th:href="@{/}" class="alert-link">Search for a train!</a>
            </div>

            <div th:if="${!#lists.isEmpty(bookings)}" class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Train</th>
                            <th>Route</th>
                            <th>Departure</th>
                            <th>Seats</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="booking : ${bookings}">
                            <td class="ps-4" th:text="'#' + ${booking.id}"></td>
                            <td th:text="${booking.trainSchedule.train.name}"></td>
                            <td>
                                <span th:text="${booking.fromStation}"></span> &rarr;
                                <span th:text="${booking.toStation}"></span>
                            </td>
                            <td th:text="${booking.trainSchedule.getDepartureTimeAt(booking.fromStation)}"></td>
                            <td>
                                <span class="badge bg-success" th:text="${booking.numberOfSeats}"></span>
                            </td>
                            <td>
                                <form th:action="@{/my-bookings/cancel/{id}(id=${booking.id})}" method="post"
                                      onsubmit="return confirm('Are you sure?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">Cancel</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
